{% extends 'base.html' %}

{% block title %}Adaugă Meditație{% endblock %}

{% block content %}
<div class="flex justify-center">
    <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-lg">
        <h2 class="text-2xl font-bold text-center text-gray-800">Adaugă Meditație Nouă</h2>
        <form method="post" class="mt-6 space-y-4">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="w-full bg-green-600 text-white py-2 px-4 rounded-lg hover:bg-green-700">Salvează</button>
        </form>
    </div>
</div>
{% endblock %}
